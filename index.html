<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salary App - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Login Section -->
    <div id="loginSection" class="login-container">
        <div class="login-box">
            <h1>Login</h1>
            <form id="loginForm">
                <div class="form-group">
                    <input type="text" id="username" placeholder="Username" required>
                </div>
                <div class="form-group">
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn btn-blue">Login</button>
            </form>
        </div>
    </div>

    <!-- App Section (Hidden by default) -->
    <div id="appSection" class="container" style="display: none;">
        <header>
            <h1>Salary App</h1>
            <button id="logoutBtn" class="logout-btn">Logout</button>
        </header>

        <div class="form-container">
            <div class="input-row">
                <input type="text" id="employeeName" placeholder="Name" value="Ahmed">
                <input type="number" id="basicSalary" placeholder="Basic" value="700">
            </div>
            <div class="input-row">
                <input type="number" id="bonus" placeholder="Bonus" value="60">
                <input type="number" id="penalty" placeholder="Penalty" value="25">
            </div>
            <div class="input-row">
                <input type="number" id="extraHours" placeholder="Extra Hours" value="7">
                <select id="role">
                    <option value="Admin">Admin</option>
                    <option value="Employee">Employee</option>
                </select>
            </div>
            <div class="input-row">
                <select id="currency">
                    <option value="Saudi Arabia Rial">Saudi Arabia Rial</option>
                    <option value="USD">USD</option>
                    <option value="EUR">EUR</option>
                </select>
            </div>
        </div>

        <div class="actions">
            <button id="addEmployeeBtn" class="btn btn-blue">Add Employee</button>
            <button id="clearEmployeesBtn" class="btn btn-red">Clear Employees</button>
        </div>

        <div class="table-container">
            <table id="salaryTable">
                <thead>
                    <tr>
                        <th rowspan="2">Name</th>
                        <th rowspan="2">Basic</th>
                        <th rowspan="2">Bonus</th>
                        <th rowspan="2">Penalty</th>
                        <th colspan="3">Extra Hours</th>
                        <th rowspan="2">Gross</th>
                        <th colspan="2">Taxes</th>
                        <th rowspan="2">Net Salary</th>
                    </tr>
                    <tr>
                        <th>No. of Hours</th>
                        <th>Hour Value</th>
                        <th>Total</th>
                        <th>Rate</th>
                        <th>Value</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Employee rows will be added here -->
                </tbody>
            </table>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
